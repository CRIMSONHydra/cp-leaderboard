name: Validate Platform Constants

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate:
    name: Validate Constants Consistency
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      
      - name: Validate platform constants
        run: pnpm run validate:constants
      
      - name: Report validation result
        if: failure()
        run: |
          echo "❌ Platform constants validation failed!"
          echo "The PLATFORMS array is duplicated or out of sync between frontend and backend."
          echo "Please ensure all platform definitions import from shared/constants.js"
          exit 1

