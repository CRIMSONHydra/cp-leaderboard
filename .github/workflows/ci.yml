name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-constants:
    name: Validate Constants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Validate platform constants
        run: node scripts/validate-constants.js

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    needs: validate-constants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install backend dependencies
        working-directory: ./backend
        run: pnpm install
      # Add linting step when configured
      # - name: Run lint
      #   working-directory: ./backend
      #   run: pnpm run lint

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: validate-constants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install
      - name: Run lint
        working-directory: ./frontend
        run: pnpm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: validate-constants
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: pnpm install
      - name: Build frontend
        working-directory: ./frontend
        run: pnpm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

