# Render configuration for CP Leaderboard
# Single web service — cron is handled externally via Google Apps Script

services:
  - type: web
    name: cp-leaderboard
    runtime: node
    buildCommand: pnpm run build:prod
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Set manually in Render dashboard
      - key: CRON_SECRET
        generateValue: true
      - key: BOOTSTRAP_SECRET
        generateValue: true
    autoDeploy: false
    healthCheckPath: /api/health
